<!DOCTYPE html>

<head>

<title>Pāṇinian Taddhita Engine — 4.1.83 to 4.2.36</title>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Spectral+SC:wght@400;600&family=Noto+Sans+Devanagari:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0e0f0d;
  --bg2:       #141510;
  --bg3:       #1a1c16;
  --border:    #2a2d22;
  --gold:      #c9a84c;
  --gold2:     #e8c87a;
  --gold-dim:  rgba(201,168,76,0.12);
  --gold-glow: rgba(201,168,76,0.06);
  --text:      #d4cdb8;
  --text2:     #8a8470;
  --text3:     #4a4840;
  --red:       #c06050;
  --green:     #6a9060;
  --blue:      #5080a0;
  --accent:    #a06040;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Spectral',Georgia,serif;
  font-size:15px;
  line-height:1.6;
  display:flex;
  flex-direction:column;
}

/* ── HEADER ── */
header{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:14px 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
.header-left{display:flex;flex-direction:column}
.header-title{
  font-family:'Spectral SC',serif;
  font-size:17px;
  letter-spacing:2px;
  color:var(--gold2);
  font-weight:600;
}
.header-scope{
  font-size:11px;
  letter-spacing:3px;
  color:var(--text3);
  margin-top:2px;
  font-family:'Noto Sans Devanagari',sans-serif;
}
.shloka{
  font-style:italic;
  font-size:12px;
  color:var(--text3);
  text-align:right;
  font-family:'Noto Sans Devanagari',sans-serif;
}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
aside{
  width:240px;
  background:var(--bg2);
  border-right:1px solid var(--border);
  overflow-y:auto;
  flex-shrink:0;
  padding-bottom:20px;
}
.side-section{
  padding:14px 16px 6px;
  font-size:9px;
  letter-spacing:3px;
  color:var(--text3);
  text-transform:uppercase;
  font-family:'Spectral SC',serif;
}
.adh-btn{
  display:flex;
  align-items:flex-start;
  gap:10px;
  width:100%;
  padding:9px 16px;
  background:none;
  border:none;
  border-left:3px solid transparent;
  color:var(--text2);
  cursor:pointer;
  text-align:left;
  font-family:inherit;
  transition:all .15s;
  position:relative;
}
.adh-btn:hover:not(:disabled){background:var(--gold-glow);color:var(--text)}
.adh-btn.active{
  background:var(--gold-dim);
  border-left-color:var(--gold);
  color:var(--gold2);
}
.adh-btn:disabled{opacity:0.35;cursor:not-allowed}
.adh-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;margin-top:1px}
.adh-san{
  font-family:'Noto Sans Devanagari',sans-serif;
  font-size:13px;
  display:block;
  line-height:1.3;
}
.adh-eng{font-size:10px;color:var(--text3);display:block;margin-top:2px;letter-spacing:.5px}
.adh-badge{
  font-size:9px;
  padding:1px 5px;
  border-radius:2px;
  margin-left:auto;
  flex-shrink:0;
}
.badge-ok{background:rgba(106,144,96,.2);color:var(--green)}
.badge-soon{background:rgba(74,72,64,.3);color:var(--text3)}

/* ── MAIN ── */
main{flex:1;overflow-y:auto;padding:24px 28px}

/* ── CARD ── */
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:4px;
  margin-bottom:18px;
  overflow:hidden;
}
.card-head{
  padding:11px 18px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--bg3);
}
.card-title{color:var(--gold);font-family:'Spectral SC',serif;font-size:13px;letter-spacing:1px}
.card-sub{font-size:11px;color:var(--text3);margin-left:4px}
.card-body{padding:18px}

/* ── INPUT ── */
.input-row{display:flex;gap:10px;margin-bottom:14px}
.deva-input{
  flex:1;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:3px;
  padding:10px 16px;
  color:var(--text);
  font-family:'Noto Sans Devanagari',sans-serif;
  font-size:22px;
  outline:none;
  transition:border-color .2s;
}
.deva-input:focus{border-color:rgba(201,168,76,.4);box-shadow:0 0 0 2px rgba(201,168,76,.06)}
.btn-derive{
  background:var(--gold);
  border:none;
  border-radius:3px;
  padding:0 22px;
  color:#0e0f0d;
  font-weight:600;
  font-size:13px;
  cursor:pointer;
  font-family:'Spectral SC',serif;
  letter-spacing:1px;
  transition:background .15s;
  white-space:nowrap;
}
.btn-derive:hover{background:var(--gold2)}

/* ── CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.chip{
  padding:3px 10px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:2px;
  font-size:12px;
  color:var(--text2);
  cursor:pointer;
  font-family:'Noto Sans Devanagari',sans-serif;
  transition:all .15s;
}
.chip:hover{border-color:rgba(201,168,76,.3);color:var(--text)}
.chip.active{background:var(--gold-dim);border-color:rgba(201,168,76,.35);color:var(--gold2)}

/* ── QUESTIONS ── */
.q-label{
  font-size:10px;
  letter-spacing:2px;
  color:var(--text3);
  text-transform:uppercase;
  margin-bottom:7px;
  display:block;
  font-family:'Spectral SC',serif;
}
.radio-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.radio-opt{
  display:flex;
  align-items:center;
  gap:10px;
  padding:7px 13px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:3px;
  cursor:pointer;
  font-size:13px;
  color:var(--text2);
  transition:all .15s;
  font-family:'Noto Sans Devanagari',sans-serif;
}
.radio-opt:hover{background:var(--gold-glow);color:var(--text)}
.radio-opt.sel{
  background:var(--gold-dim);
  border-color:rgba(201,168,76,.3);
  color:var(--gold2);
}
.radio-dot{
  width:12px;height:12px;
  border-radius:50%;
  border:2px solid var(--text3);
  flex-shrink:0;
  transition:all .15s;
}
.radio-opt.sel .radio-dot{background:var(--gold);border-color:var(--gold)}

/* ── RESULT ── */
.result-box{
  background:var(--bg);
  border:1px solid #2a3020;
  border-radius:5px;
  padding:22px 26px;
  margin-top:6px;
  animation:slideIn .3s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.res-sutra-no{
  display:inline-block;
  font-size:10px;
  letter-spacing:2px;
  color:var(--gold);
  background:var(--gold-dim);
  padding:3px 10px;
  border-radius:2px;
  margin-bottom:10px;
  font-family:'Spectral SC',serif;
}
.res-sutra-text{
  font-size:17px;
  color:var(--text);
  margin-bottom:16px;
  font-family:'Noto Sans Devanagari',sans-serif;
}
.res-final{
  text-align:center;
  font-size:38px;
  color:#f0e8d0;
  padding:18px 0;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  margin-bottom:16px;
  font-family:'Noto Sans Devanagari',sans-serif;
  letter-spacing:1px;
}
.res-pratyaya{
  text-align:center;
  margin-bottom:18px;
}
.pratyaya-badge{
  display:inline-block;
  padding:3px 14px;
  background:var(--gold-dim);
  border:1px solid rgba(201,168,76,.25);
  border-radius:2px;
  font-size:12px;
  color:var(--gold);
  font-family:'Noto Sans Devanagari',sans-serif;
  letter-spacing:.5px;
}
.deriv-label{
  font-size:10px;
  letter-spacing:2px;
  color:var(--text3);
  text-transform:uppercase;
  margin-bottom:8px;
  font-family:'Spectral SC',serif;
}
.deriv-steps{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:6px;
  margin-bottom:16px;
  background:var(--bg3);
  padding:10px 14px;
  border-radius:3px;
  border:1px solid var(--border);
}
.step{
  font-size:13px;
  color:var(--text2);
  padding:3px 10px;
  background:rgba(255,255,255,.03);
  border-radius:2px;
  border:1px solid rgba(255,255,255,.06);
  font-family:'Noto Sans Devanagari',sans-serif;
}
.step.final{
  color:#f0e8d0;
  background:rgba(201,168,76,.1);
  border-color:rgba(201,168,76,.35);
  font-weight:500;
}
.step-rule{
  font-size:10px;
  color:var(--text3);
  font-family:'Spectral',serif;
  font-style:italic;
  padding:2px 7px;
  border:1px dashed var(--border);
  border-radius:2px;
}
.arrow{color:var(--gold);font-size:11px;opacity:0.7}
.notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.note-box{
  padding:10px 14px;
  background:rgba(255,255,255,.02);
  border-radius:3px;
  border-left:3px solid var(--gold);
}
.note-box.eng{border-left-color:var(--blue)}
.note-title{
  font-size:9px;
  letter-spacing:2px;
  color:var(--text3);
  margin-bottom:4px;
  display:block;
  font-family:'Spectral SC',serif;
}
.note-text{
  font-size:12px;
  color:var(--text2);
  line-height:1.6;
  font-family:'Noto Sans Devanagari',sans-serif;
}
.error-box{
  padding:12px 16px;
  background:rgba(192,96,80,.08);
  border:1px solid rgba(192,96,80,.2);
  border-radius:3px;
  color:#c08070;
  font-size:13px;
  margin-top:10px;
  font-family:'Noto Sans Devanagari',sans-serif;
}

/* ── HISTORY ── */
.hist-wrap{display:flex;flex-wrap:wrap;gap:7px;padding:12px 18px}
.hist-btn{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:3px;
  padding:5px 12px;
  font-family:'Noto Sans Devanagari',sans-serif;
  font-size:13px;
  cursor:pointer;
  color:var(--text2);
  display:flex;
  gap:8px;
  align-items:center;
  transition:all .15s;
}
.hist-btn:hover{border-color:rgba(201,168,76,.3);color:var(--text)}
.hist-result{color:var(--gold);font-size:11px}

::-webkit-scrollbar{width:5px;background:var(--bg)}

@media(max-width:700px){
  aside{width:190px}
  main{padding:16px}
  .notes-grid{grid-template-columns:1fr}
}
</style>

<header>

    <div class="header-scope">4.1.83–4.1.152 · 4.2.1–4.2.36 · पितृव्यमातुलमातामहपितामहाः स्वतन्त्रम् ✅</div>

<script>
// ============================================================
// ॥ श्रीः ॥  Pāṇinian Taddhita Master Engine
// ============================================================

// ── Sandhi Engine ────────────────────────────────────────────
const VI={'अ':'आ','आ':'आ','इ':'ऐ','ई':'ऐ','उ':'औ','ऊ':'औ','ऋ':'आर्','ॠ':'आर्','ए':'ऐ','ऐ':'ऐ','ओ':'औ','औ':'औ'};
const MA={'ा':'ा','ि':'ै','ी':'ै','ु':'ौ','ू':'ौ','ृ':'ार्','ॄ':'ार्','े':'ै','ै':'ै','ो':'ौ','ौ':'ौ'};
const CO="कखगघङचछजझञटठडढणतथदधनपफबभमयरलवशषसह";

function applyAn(stem){
  let vs="",vf=false;const ch=[...stem];let i=0;
  while(i<ch.length){const c=ch[i];
    if(!vf){if(VI[c]){vs+=VI[c];vf=true;i++;continue;}
      if(CO.includes(c)&&i+1<ch.length){const n=ch[i+1];
        if(n==='्'){vs+=c+n;i+=2;continue;}
        if(MA[n]){vs+=c+(MA[n]==='ार्'?'ार्':MA[n]);vf=true;i+=2;continue;}
        vs+=c+'ा';vf=true;i++;continue;}
      if(CO.includes(c)){vs+=c+'ा';vf=true;i++;continue;}}
    vs+=c;i++;}
  let f=vs;
  if(['ा','ि','ी','े','ै'].some(m=>f.endsWith(m)))f=f.slice(0,-1);
  else if(['ु','ू'].some(m=>f.endsWith(m)))f=f.slice(0,-1)+'व';
  else if(f.endsWith('न्'))f=f.slice(0,-2);
  else if(f.endsWith('्'))f=f.slice(0,-1);
  return f;
}
function applyInj(stem){
  let vs="",vf=false;const ch=[...stem];let i=0;
  while(i<ch.length){const c=ch[i];
    if(!vf){if(VI[c]){vs+=VI[c];vf=true;i++;continue;}
      if(CO.includes(c)&&i+1<ch.length){const n=ch[i+1];
        if(n==='्'){vs+=c+n;i+=2;continue;}
        if(MA[n]){vs+=c+(MA[n]==='ार्'?'ार्':MA[n]);vf=true;i+=2;continue;}
        vs+=c+'ा';vf=true;i++;continue;}
      if(CO.includes(c)){vs+=c+'ा';vf=true;i++;continue;}}
    vs+=c;i++;}
  let f=vs;
  if(['ा','ि','ी','े','ै','ो','ौ'].some(m=>f.endsWith(m)))f=f.slice(0,-1)+'ि';
  else if(['ु','ू'].some(m=>f.endsWith(m)))f=f.slice(0,-1)+'वि';
  else if(f.endsWith('न्'))f=f.slice(0,-2)+'ि';
  else if(f.endsWith('्'))f=f.slice(0,-1)+'ि';
  else f=f+'ि';
  return f;
}
function anDeriv(stem,suf='म्'){const b=applyAn(stem);return`${stem} →[७.२.११७]→ ${b} →[अण्]→ ${b}${suf}`;}

function isAkarant(w){
  const m=['ा','ि','ी','ु','ू','ृ','ॄ','े','ै','ो','ौ','्','ः','ं'];
  if(w.endsWith('अ'))return true;
  if(!m.includes(w[w.length-1]))return true;
  return false;
}

// ── All Data ────────────────────────────────────────────────
const ashvapati_data={"अश्वपति":"आश्वपत","अक्षपति":"आक्षपत","ज्ञानपति":"ज्ञानपत","शतपति":"शातपत","गणपति":"गाणपत","स्थानपति":"स्थाणपत","यज्ञपति":"याज्ञपत","राष्ट्रपति":"राष्ट्रपत","कुलपति":"कौलपत","गृहपति":"गार्हपत","पशुपति":"पाशुपत","धान्यपति":"धान्यपत","धन्वपति":"धान्वपत","बन्धुपति":"बान्धुपत","धर्मपति":"धार्मपत","सभापति":"साभापत","प्राणपति":"प्राणपत","क्षेत्रपति":"क्षैत्रपत"};
const dityadi_list=["दिति","अदिति","आदित्य"];
const utsadi_gana=["उत्स","उदपान","विकर","विनद","महानद","मदानस","महाप्राण","तरुण","तलुन","वष्कय","पृथिवी","धेनु","पंक्ति","जगती","त्रिष्टुप्","अनुष्टुभ्","जनपद","भरत","उशीनर","ग्रीष्म","पीलुकुण","उदस्थान","पृषत्","भल्लकीय","रथन्तर","मध्यंदिन","बृहत्","महत्","सत्त्वत्","कुरु","पञ्चाल","इन्द्रावसान","उष्णिह्","ककुभ्","सुवर्ण","देव"];
const agni_kali_list=["अग्नि","कलि"];

function buildExtra(adh,answers,stem){
  if(adh==="apatya_gotra"){
    // Collect clan answer from whichever clan key was answered
    const clanAns = answers.clan102 ||answers.clan102b||answers.clan102c||
                    answers.clan106a||answers.clan106b||
                    answers.clan117a||answers.clan117b||answers.clan117c||null;
    // 'other' means no specific apavāda → pass null so solver uses fallback
    const extra = (clanAns && clanAns!=="other") ? clanAns : null;
    return {sub:answers.sub||"apatya", extra};
  }
  if(adh==="nakshatra_time"){
    if(answers.is_kala==="no") return {extra:"not_time"};
    if(answers.dvandva==="yes") return {extra:"dvandva"};
    if(answers.vishesha==="avishesha") return {extra:"avishesha"};
    if(["श्रवण","अश्वत्थ"].includes(stem)) return {extra:"vishesha_sanjna"};
    return {extra:"vishesha"};
  }
  if(adh==="parivrito_rathah"){
    if(answers.is_chariot==="no") return {extra:"not_chariot"};
    if(answers.is_covering==="no") return {extra:"not_covering"};
    return {extra:"valid_chariot"};
  }
  if(adh==="tatroddhritam") return {extra:answers.is_vessel==="no"?"not_amatra":"is_amatra"};
  if(adh==="samskritam_bhakshah"){
    if(answers.is_food==="no") return {extra:"not_bhaksha"};
    if(answers.is_dvigu==="yes") return {extra:"is_dvigu"};
    return {extra:"valid_bhaksha"};
  }
  if(adh==="devata"){
    if(answers.is_dev==="no") return {extra:"not_devata"};
    return {extra:"is_devata"};
  }
  if(adh==="nipatan"){
    return {extra: answers.nip_ctx||null};
  }
  return {};
}

function R(no,text,suffix,derivation,note_san,note_eng){return{no,text,suffix,derivation,note_san,note_eng};}

function solve(stem,mc,sub,extra){
  const ad=(s,n='म्')=>anDeriv(s,n);

  // ══ APATYA ══
  if(mc==='apatya_gotra'){
    if(stem in kurunadi_nya) return R("4.1.152","कुरुनादिभ्यो ण्यः","ण्य",`${stem} →[ण्य]→ ${kurunadi_nya[stem]}ः`,"कुरुनादि-गणात् ण्य।","Takes Ṇya.");
    if(stem==="अत्रि") return R("4.1.122","आत्रेयीषु ढक्","ढक् (एय)","अत्रि →[७.२.११७]→ आत्रि →[ढक्]→ आत्रेयः","अत्रि → ढक्।","Atri takes Ḍhak.");
    if(stem in bahvadi_data) return R("4.1.96","बाह्वादिभ्यश्च","इञ्",`${stem} + इञ् → ${bahvadi_data[stem]}ः`,"बाह्वादि-गणात् इञ्।","Bāhvādi takes Iñ.");
    if(stem in sudhatri_data) return R("4.1.97","सुधातृभ्यस्त्रिष्वप्यकञ्","इञ् + अकङ्",`${stem} → ${sudhatri_data[stem]}ः`,"सुधातृ-गणात् इञ् + अकङ्।","Sudhātṛ: Iñ + Akaṅ.");
    const is114=(rishi_list.includes(stem))||(andhaka_list.includes(stem)&&extra==="andhaka")||(vrishni_list.includes(stem)&&extra==="vrishni")||(kuru_list.includes(stem)&&extra==="kuru"&&!kurunadi_nya[stem]);
    if(is114) return R("4.1.114","ऋष्यन्धकवृष्णिकुरुभ्यश्च","अण्",ad(stem),"ऋषि/अन्धक/वृष्णि/कुरु → अण्।","Aṇ for Rishi/Andhaka/Vrishni/Kuru.");
    // 4.1.102 — शरद्वच्छुनकदर्भभृगुवत्साग्रायणेभ्यः फक्
    // Context-sensitive: Phak only in specific gotra
    const clan102 = {
      "शरद्वत्": ["bhrigu",   "भृगु",      "शारद्वतायनः", "शारद्वत"],
      "शुनक":    ["vatsa",    "वत्स",       "शौनकायनः",   "शौनक"],
      "दर्भ":    ["agrayana", "आग्रायण",    "दार्भायणः",  "दार्भ"],
    };
    if(stem in clan102){
      const[reqClan,clanSan,phakForm,anjForm]=clan102[stem];
      if(sub==='gotra'&&extra===reqClan)
        return R("4.1.102","शरद्वच्छुनकदर्भभृगुवत्साग्रायणेभ्यः फक्","फक् (आयन)",
          `${stem} →[७.२.११७ आदिवृद्धिः]→ ${phakForm}`,
          `'${stem}' ${clanSan}-गोत्रे → ४.१.१०२ इत्यनेन फक्-प्रत्ययः।`,
          `Phak for '${stem}' specifically in ${clanSan} (${reqClan}) gotra.`);
      // Falls through to अञ् via bidadi or general अण् below
    }

    // 4.1.106 — मधुबभ्र्वोर्ब्राह्मणकौशिकयोः (Yañ in specific gotra)
    // मधु → Brāhmaṇa gotra → यञ् (माधवः); otherwise → अत इञ् (4.1.95)
    // बभ्रु → Kauśika gotra → यञ् (बाभ्रव्यः); otherwise → अत इञ्
    const clan106 = {
      "मधु":  ["brahmana", "ब्राह्मण", "माधवः"],
      "बभ्रु": ["kaushika", "कौशिक",   "बाभ्रव्यः"],
    };
    if(stem in clan106){
      const[reqClan,clanSan,form]=clan106[stem];
      if(sub==='gotra'&&extra===reqClan)
        return R("4.1.106","मधुबभ्र्वोर्ब्राह्मणकौशिकयोः","यञ्",
          `${stem} →[७.२.११७ आदिवृद्धिः]→ ${form}`,
          `'${stem}' ${clanSan}-गोत्रे → ४.१.१०६ इत्यनेन यञ्-प्रत्ययः।`,
          `Yañ for '${stem}' specifically in ${clanSan} (${reqClan}) gotra.`);
      // Falls through to अत इञ् (4.1.95) below for other clans
    }

    // 4.1.117 — विकर्णशुङ्गच्छगलाद्वत्सभरद्वाजात्रिषु (context-sensitive Phañ)
    const clan117={"विकर्ण":["vatsa","वत्स","वैकर्णायनः"],"शुङ्ग":["bharadvaja","भरद्वाज","शौङ्गायनः"],"शुङ्गा":["bharadvaja","भरद्वाज","शौङ्गायनः"],"छगल":["atri","अत्रि","छागलायनः"]};
    if(stem in clan117){const[reqClan,clanSan,form]=clan117[stem];if(extra===reqClan) return R("4.1.117","विकर्णशुङ्गच्छगलाद्वत्सभरद्वाजात्रिषु","फञ् (आयन)",`${stem} →[७.२.११७]→ ${form}`,`'${stem}' ${clanSan}-गोत्रे → ४.१.११७ फञ्।`,`Phañ for '${stem}' in ${clanSan} (${reqClan}) clan.`);}
    if(stem==="पीला") return R("4.1.120","पीलाया वा","अण् (वा)","पीला →[७.२.११७]→ पैला →[अण्]→ पैलः | →[ढक्]→ पैलेयः","'पीला' → विकल्पेन अण्, पक्षे ढक्।","Pīlā optionally Aṇ, else Ḍhak.");
    if(stem in avriddha_nadi) return R("4.1.113","अवृद्धाभ्यो नदीमानुषीभ्यः","अण्",ad(stem),"अवृद्ध-नदी/मानुषी → अण्।","Aṇ for Avṛddha river-names.");
    if(stem in shivadi_data) return R("4.1.112","शिवादिभ्योऽण्","अण्",ad(stem),"शिवादि-गणात् अण्।","Śivādi takes Aṇ.");
    if(stem in ashvadi_data&&sub==='gotra') return R("4.1.110","अश्वादिभ्यः फञ्","फञ् (आयन)",`${stem} →[फञ्]→ ${ashvadi_data[stem]}ः`,"अश्वादि-गणात् फञ्।","Aśvādi takes Phañ.");
    if(stem in kapibodha_data&&extra==="angirasa") return R("4.1.107","कपिबोधाद् यञि अङ्गिरसगोत्रे","यञ्",`${stem} → ${kapibodha_data[stem]}ः`,"अङ्गिरसगोत्रे कपिबोधात् यञ्।","Kapibodha + Āṅgirasa → Yañ.");
    if(stem in gargadi_data&&sub==='gotra') return R("4.1.105","गर्गादिभ्यो यञ्","यञ्",`${stem} →[यञ्]→ ${gargadi_data[stem]}ः`,"गर्गादि-गणात् यञ्।","Gargādi takes Yañ.");
    if(stem in bidadi_data){
      if(sub==='gotra'&&!non_rishi_list.includes(stem)) return R("4.1.104","बिदादिभ्योऽञ् (गोत्रे)","अञ्",`${stem} →[अञ्]→ ${bidadi_data[stem]}ः`,"बिदादि → गोत्रे अञ्।","Bidādi in Gotra → Añ.");

स्त्री: डामहच् 'षित्' अस्ति → षिद्गौरादिभ्यश्च (४.१.४१) → ङीष् → पितामही ।`,
        `Nipātana. Father's father = पितामहः (Paternal Grandfather).
Vārttika: ताभ्यां पितरि डामहच् — affix डामहच् after पितृ/मातृ in sense 'their father'.
पितृ + डामहच् → ṭi-lopa (6.4.143) drops ṛ → पित् + आमह → पितामहः.
Fem: डामहच् is ṣit → ṅīṣ by 4.1.41 → पितामही.`
      );
      // No context selected yet
      return R(
        "4.2.36 — निपातनम्",
        "पितृव्यमातुलमातामहपितामहाः",
        "निपातनम्",
        "पितृ — कृपया अर्थं चिनोतु",
        "अर्थः अनिश्चितः — भ्राता वा पिता वा चिनोतु ।",
        "Please select the intended meaning (brother / father)."
      );
    }

    // ── मातृ ───────────────────────────────────────────────────
    if(stem==="मातृ"){
      if(ctx==="brother") return R(
        "4.2.36 (वार्) — मातुर्डुलच्",
        "मातुर्डुलच्",
        "डुलच्",
        "मातृ + डुलच् →[ड-च-इत्संज्ञा-लोपः]→ मातृ + उल →[टेः ६.४.१४३ → ऋकारलोपः]→ मात् + उल →[संधिः]→ मातुलः",
        `निपातनम् — मातुः भ्राता = मातुलः (Maternal Uncle) ।
वार्त्तिकम्: मातुर्डुलच् ।
प्रक्रिया:
१. मातृ + डुलच् — डकारचकारयोः इत्संज्ञा, लोपः → मातृ + उल
२. टेः (६.४.१४३) — ऋकारः टिसंज्ञकः, तस्य लोपः → मात् + उल
३. मात् + उल → मातुलः`,
        `Nipātana. Mother's brother = मातुलः (Maternal Uncle).
Vārttika: मातुर्डुलच् — affix डुलच् after मातृ meaning 'her brother'.
Process:
1. मातृ + डुलच् → ḍ and c are it → drop → मातृ + उल
2. ṭi-lopa (6.4.143): ṛ is ṭi, dropped → मात् + उल
3. मात् + उल → मातुलः`
      );
      if(ctx==="father") return R(
        "4.2.36 (वार्) — ताभ्यां पितरि डामहच्",
        "मातृपितृभ्यां पितरि डामहच्",
        "डामहच्",
        "मातृ + डामहच् →[टेः ६.४.१४३ → ऋकारलोपः]→ मात् + आमह →[संधिः]→ मातामहः । स्त्री: मातामही (षित् + ङीष् ४.१.४१)",
        `निपातनम् — मातुः पिता = मातामहः (Maternal Grandfather) ।
वार्त्तिकम्: ताभ्यां पितरि डामहच् ।
मातृ + डामहच् → टेः (६.४.१४३) ऋकारलोपः → मात् + आमह → मातामहः ।
स्त्री: षित्वात् (४.१.४१) ङीष् → मातामही ।`,
        `Nipātana. Mother's father = मातामहः (Maternal Grandfather).
Vārttika: ताभ्यां पितरि डामहच् — after मातृ/पितृ in sense of 'their father'.
मातृ + डामहच् → ṭi-lopa (6.4.143) → मात् + आमह → मातामहः.
Fem (षित्): by 4.1.41 → ṅīṣ → मातामही.`
      );
      if(ctx==="mother") return R(
        "4.2.36 (वार्) — मातरि षिच्च",
        "मातरि षिच्च — डामहच् (षित्) + ङीष्",
        "डामहच् (षित्) + ङीष्",
        "मातृ + डामहच् →[षित् → ङीष् ४.१.४१]→ मात् + आमह + ई →[संधिः]→ मातामही | पितृ + डामहच् + ङीष् → पितामही",
        `निपातनम् — मातुः माता = मातामही, पितुः माता = पितामही ।
वार्त्तिकम्: मातरि षिच्च ।
डामहच्-प्रत्ययः 'षित्' अपि अस्ति ।
षिद्गौरादिभ्यश्च (४.१.४१) → स्त्रीत्वे ङीष् विधीयते ।
मातृ + डामहच् + ङीष् → मातामही ।
पितृ + डामहच् + ङीष् → पितामही ।`,
        `Nipātana. Mother's mother = मातामही; Father's mother = पितामही.
Vārttika: मातरि षिच्च — डामहच् is also ṣit.
By 4.1.41 (ṣid-gaurādi): ṅīṣ added for feminine.
मातृ + डामहच् + ṅīṣ → मातामही.
पितृ + डामहच् + ṅīṣ → पितामही.`
      );
      return R(
        "4.2.36 — निपातनम्",
        "पितृव्यमातुलमातामहपितामहाः",
        "निपातनम्",
        "मातृ — कृपया अर्थं चिनोतु",
        "अर्थः अनिश्चितः — भ्राता / पिता / माता चिनोतु ।",
        "Please select the intended meaning."
      );
    }

    // ── अवि ────────────────────────────────────────────────────
    if(stem==="अवि"){
      return R(
        "4.2.36 (वार्) — अवेर्दुग्धे सोढदूसमरीसचः",
        "अवेर्दुग्धे सोढ-दूस-मरीसचः",
        "सोढ / दूस / मरीसच्",
        "अवि + सोढ  → अविसोढम् ।\nअवि + दूस   → अविदूसम् ।\nअवि + मरीसच् → अविमरीसम् ।",
        `निपातनम् — अवेः दुग्धम् ।
वार्त्तिकम्: अवेः दुग्धे सोढ-दूस-मरीसचः वक्तव्याः ।
अवि (= मेषः / एडकः) इत्यस्मात् 'दुग्धम्' अस्मिन् अर्थे त्रयः प्रत्ययाः भवन्ति —
  १. अवि + सोढ  → अविसोढम्
  २. अवि + दूस   → अविदूसम्
  ३. अवि + मरीसच् → अविमरीसम्`,
        `Nipātana. Sheep's milk — three vārttika affixes.
Vārttika: अवेर्दुग्धे सोढ-दूस-मरीसचः
After अवि (= sheep/ewe), in the meaning 'its milk':
  1. अवि + सोढ  → अविसोढम्
  2. अवि + दूस   → अविदूसम्
  3. अवि + मरीसच् → अविमरीसम्`
      );
    }

    // ── तिल ────────────────────────────────────────────────────
    if(stem==="तिल"){
      return R(
        "4.2.36 (वार्) — तिलात् निष्फलात् पिञ्जपेजौ",
        "तिलात् निष्फलात् पिञ्ज-पेजौ",
        "पिञ्ज / पेज",
        "तिल + पिञ्ज → तिलपिञ्जम् ।\nतिल + पेज  → तिलपेजम् ।\nवैदिकम्: तिल + पिञ्ज् (डित्) →[टेः ६.४.१४३]→ तिल्पिञ्जः (AV १२.२.५४)",
        `निपातनम् — निष्फलं तिलम् ।
वार्त्तिकम्: तिलात् निष्फलात् पिञ्जपेजौ ।
तिल-शब्दात् 'निष्फलम्' अस्मिन् अर्थे द्वौ प्रत्ययौ —
  १. तिल + पिञ्ज → तिलपिञ्जम्
  २. तिल + पेज  → तिलपेजम्
वार्त्तिकम्: पिञ्जः छन्दसि डित् च —
  वेदेषु पिञ्ज् 'डित्' → टेः (६.४.१४३) टिलोपः → तिल् + पिञ्ज = तिल्पिञ्जः
  (अथर्ववेदः १२.२.५४: 'इषीकां जरतीमिष्ट्वा तिल्पिञ्जं दण्डनं नडम्')`,
        `Nipātana. Fruitless sesame — two affixes.
Vārttika: तिलात् निष्फलात् पिञ्ज-पेजौ
After तिल in the sense 'fruitless (useless) sesame':
  1. तिल + पिञ्ज → तिलपिञ्जम्
  2. तिल + पेज  → तिलपेजम्
Vārttika: पिञ्जः छन्दसि डित् च —
  In Vedic, पिञ्ज् is ḍit → ṭi-lopa (6.4.143) → तिल् + पिञ्ज = तिल्पिञ्जः
  (Atharva-veda 12.2.54: 'iṣīkāṃ jaratīmiṣṭvā tilpiñjaṃ daṇḍanaṃ naḍam')`
      );
    }

    // Unknown stem in nipātana
    return R(
      "4.2.36 — निपातनम्",
      "पितृव्यमातुलमातामहपितामहाः",
      "निपातनम्",
      `'${stem}' — अस्मिन् अधिकारे नास्ति`,
      `❌ '${stem}' अत्र निपातितः नास्ति ।`,
      `❌ '${stem}' is not in this nipātana group. Use: पितृ, मातृ, अवि, तिल.`
    );
  }

  return null;
}

// ── UI Rendering ─────────────────────────────────────────────
function buildSidebar(){
  const el=document.getElementById('adhList');
  el.innerHTML=ADHIKARAS.map(a=>`
    <button class="adh-btn${curAdh===a.id?' active':''}" 
      id="ab_${a.id}" 
      ${!a.ok?'disabled':''} 
      onclick="selectAdh('${a.id}')">
      <span class="adh-icon">${a.icon}</span>
      <span>
        <span class="adh-san">${a.san}</span>
        <span class="adh-eng">${a.eng}</span>
      </span>
      <span class="adh-badge ${a.ok?'badge-ok':'badge-soon'}">${a.ok?'✅':'🚧'}</span>
    </button>`).join('');
}

function buildChips(stem){
  const a=ADHIKARAS.find(x=>x.id===curAdh);
  const el=document.getElementById('chipsRow');
  el.innerHTML=(a.presets||[]).map(p=>`
    <span class="chip${stem===p?' active':''}" onclick="selectChip('${p}')">${p}</span>`
  ).join('');
}

function renderQuestions(stem){
  const qs=getQuestions(curAdh,stem).filter(q=>{
    if(q.onlyFor&&!q.onlyFor.includes(stem)) return false;
    if(!q.showIf) return true;
    return Object.entries(q.showIf).every(([k,v])=>answers[k]===v);
  });
  const el=document.getElementById('questionsArea');
  if(!qs.length){el.innerHTML='';return;}
  el.innerHTML=qs.map(q=>`
    <span class="q-label">${q.label}</span>
    <div class="radio-group">
      ${q.opts.map(o=>`
        <div class="radio-opt${answers[q.key]===o.v?' sel':''}" onclick="selectOpt('${q.key}','${o.v}')">
          <div class="radio-dot"></div>${o.l}
        </div>`).join('')}
    </div>`).join('');
}

function renderResult(stem,mc,sub,extra){
  const el=document.getElementById('resultArea');
  if(!stem){el.innerHTML='';return;}
  const res=solve(stem,mc,sub,extra);
  if(!res){el.innerHTML=`<div class="error-box">❌ क्षम्यताम् — '${stem}' अस्मिन् अर्थे नियमः न प्राप्तः।</div>`;return;}

  // Parse derivation steps
  const raw=res.derivation;
  const steps=raw.split('→').map(s=>s.trim()).filter(Boolean);
  const stepsHTML=steps.length>1?steps.map((s,i)=>{
    const isFinal=i===steps.length-1;
    const ruleMatch=s.match(/\[(.*?)\]/);
    const rule=ruleMatch?ruleMatch[1]:'';
    const clean=s.replace(/\[.*?\]/,'').trim();
    return(i>0?`<span class="arrow">→</span>`:'')
      +(rule?`<span class="step-rule">${rule}</span>`:'')
      +`<span class="step${isFinal?' final':''}">${clean}</span>`;
  }).join(''):'';

  const finalForm=steps.length>1?steps[steps.length-1].replace(/\[.*?\]/,'').trim():raw;

  el.innerHTML=`
    <div class="result-box" id="rb_${++animKey}">
      <div class="res-sutra-no">${res.no}</div>
      <div class="res-sutra-text">${res.text}</div>
      <div class="res-final">${finalForm}</div>
      <div class="res-pratyaya"><span class="pratyaya-badge">प्रत्ययः: ${res.suffix}</span></div>
      ${stepsHTML?`
      <div style="margin:16px 0">
        <div class="deriv-label">व्युत्पत्तिः</div>
        <div class="deriv-steps">${stepsHTML}</div>
      </div>`:''}
      <div class="notes-grid">
        <div class="note-box">
          <span class="note-title">संस्कृतम्</span>
          <span class="note-text">${res.note_san}</span>
        </div>
        <div class="note-box eng">
          <span class="note-title">English</span>
          <span class="note-text">${res.note_eng}</span>
        </div>
      </div>
    </div>`;

  // Save to history
  history.unshift({stem,adh:curAdh,sub,extra,finalForm,res});
  if(history.length>12) history.pop();
  renderHistory();
}

function renderHistory(){
  const card=document.getElementById('histCard');
  const wrap=document.getElementById('histWrap');
  if(!history.length){card.style.display='none';return;}
  card.style.display='';
  wrap.innerHTML=history.map((h,i)=>`
    <button class="hist-btn" onclick="loadHistory(${i})">
      <span>${h.stem}</span>
      <span style="color:var(--text3)">→</span>
      <span class="hist-result">${h.finalForm}</span>
    </button>`).join('');
}

// ── Actions ──────────────────────────────────────────────────
function selectAdh(id){
  const a=ADHIKARAS.find(x=>x.id===id);if(!a||!a.ok)return;
  curAdh=id;answers={};
  document.querySelectorAll('.adh-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('ab_'+id).classList.add('active');
  const stem=document.getElementById('stemInput').value.trim();
  document.getElementById('adhIcon').textContent=a.icon;
  document.getElementById('adhTitle').textContent=a.san;
  document.getElementById('adhSub').textContent=a.eng;
  buildChips(stem);
  renderQuestions(stem);
  document.getElementById('resultArea').innerHTML='';
}

function selectChip(p){
  document.getElementById('stemInput').value=p;
  answers={};
  buildChips(p);
  renderQuestions(p);
  document.getElementById('resultArea').innerHTML='';
}

function selectOpt(key,val){
  answers={...answers,[key]:val};
  const stem=document.getElementById('stemInput').value.trim();
  renderQuestions(stem);
  document.getElementById('resultArea').innerHTML='';
}

function derive(){
  const stem=document.getElementById('stemInput').value.trim();
  if(!stem) return;
  buildChips(stem);
  const {sub,extra}=buildExtra(curAdh,answers,stem);
  renderResult(stem,curAdh,sub||null,extra||null);
}

function loadHistory(i){
  const h=history[i];
  curAdh=h.adh;
  answers={};
  document.getElementById('stemInput').value=h.stem;
  document.querySelectorAll('.adh-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('ab_'+h.adh).classList.add('active');
  const a=ADHIKARAS.find(x=>x.id===h.adh);
  if(a){document.getElementById('adhIcon').textContent=a.icon;document.getElementById('adhTitle').textContent=a.san;document.getElementById('adhSub').textContent=a.eng;}
  buildChips(h.stem);
  renderQuestions(h.stem);
  renderResult(h.stem,h.adh,h.sub,h.extra);
}

// Input events
document.getElementById('stemInput').addEventListener('keydown',e=>{if(e.key==='Enter')derive();});
document.getElementById('stemInput').addEventListener('input',e=>{
  answers={};
  const stem=e.target.value.trim();
  buildChips(stem);
  renderQuestions(stem);
  document.getElementById('resultArea').innerHTML='';
});

// Init
buildSidebar();
buildChips('');
renderQuestions('');
</script>
